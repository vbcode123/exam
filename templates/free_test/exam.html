<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Examination</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body{
            background:#f2f6f9;
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
        }

        /* ================= TOP BAR FIXED ================= */
        .top-bar{
            background:#003366;
            color:#fff;
            padding:12px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            z-index:999;
        }

        .timer-box{
            background:#ffc107;
            color:#000;
            padding:6px 14px;
            border-radius:4px;
            font-weight:bold;
        }

        /* SPACE FOR FIXED HEADER */
        .content-wrapper{
            margin-top:90px;
        }

        /* QUESTION CARD */
        .question-card{
            background:#fff;
            border-radius:6px;
            padding:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        /* OPTION BUTTONS */
        .option-box{
            border:1px solid #ccc;
            border-radius:6px;
            padding:14px;
            margin-bottom:12px;
            font-size:18px;
            cursor:pointer;
            transition:0.2s;
        }
        .option-box:hover{
            background:#e3f2fd;
            border-color:#0d6efd;
        }
        .option-box input{
            margin-right:10px;
        }

        /* FOOTER BAR */
        .bottom-bar{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#fff;
            border-top:1px solid #ddd;
            padding:10px 20px;
            text-align:right;
            z-index:999;
        }
    </style>
</head>

<body>

<!-- ================= TOP HEADER ================= -->
<div class="top-bar">
    <div>
        <b>{{ attempt.exam.name }}</b><br>
        <small>Computer Based Test (CBT)</small>
    </div>
    <div class="timer-box">
        Time Left: <span id="timer">{{ attempt.exam.duration_minutes }}:00</span>
    </div>
</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="container content-wrapper mb-5">

<form method="post" id="examForm"
      action="{% url 'submit_free_test' attempt.id %}">
{% csrf_token %}

{% for q in questions %}
<div class="question-card mb-4">

    <h5 class="mb-3">
        Q{{ forloop.counter }}. {{ q.question.question|safe }}
    </h5>

    <label class="option-box d-block">
        <input type="radio" name="q_{{ q.id }}" value="A">
        <b>A.</b> {{ q.question.option_a }}
    </label>

    <label class="option-box d-block">
        <input type="radio" name="q_{{ q.id }}" value="B">
        <b>B.</b> {{ q.question.option_b }}
    </label>

    <label class="option-box d-block">
        <input type="radio" name="q_{{ q.id }}" value="C">
        <b>C.</b> {{ q.question.option_c }}
    </label>

    <label class="option-box d-block">
        <input type="radio" name="q_{{ q.id }}" value="D">
        <b>D.</b> {{ q.question.option_d }}
    </label>

</div>
{% endfor %}

<!-- ================= BOTTOM BAR ================= -->
<div class="bottom-bar">
    <button type="button" class="btn btn-danger btn-lg" onclick="confirmSubmit()">
        Submit Exam
    </button>
</div>

</form>
</div>

<!-- ================= SCRIPT ================= -->
<script>
/* ========== FLAGS ========== */
let examSubmitted = false;

/* ========== BLOCK BACK BUTTON ========== */
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
};

/* ========== BEFORE UNLOAD WARNING (ONLY IF NOT SUBMITTED) ========== */
window.addEventListener("beforeunload", function (e) {
    if (!examSubmitted) {
        e.preventDefault();
        e.returnValue = '';
    }
});

/* ========== SWEETALERT SUBMIT ========== */
function confirmSubmit(){
    Swal.fire({
        title: "Submit Exam?",
        text: "Once submitted, you cannot change your answers.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#d33",
        cancelButtonColor: "#3085d6",
        confirmButtonText: "Yes, Submit",
        cancelButtonText: "Cancel"
    }).then((result) => {
        if (result.isConfirmed) {
            examSubmitted = true;
            window.onbeforeunload = null;
            document.getElementById("examForm").submit();
        }
    });
}

/* ========== TIMER ========== */
let totalSeconds = {{ attempt.exam.duration_minutes }} * 60;
const timerEl = document.getElementById("timer");
const form = document.getElementById("examForm");

const timer = setInterval(() => {
    let min = Math.floor(totalSeconds / 60);
    let sec = totalSeconds % 60;

    timerEl.innerText = min + ":" + (sec < 10 ? "0" : "") + sec;

    if (totalSeconds <= 0) {
        clearInterval(timer);
        examSubmitted = true;
        window.onbeforeunload = null;

        Swal.fire({
            icon: "info",
            title: "Time Up!",
            text: "Exam auto-submitted",
            allowOutsideClick: false,
            allowEscapeKey: false
        }).then(() => {
            form.submit();
        });
    }
    totalSeconds--;
}, 1000);
</script>

</body>
</html>
