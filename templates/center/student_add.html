{% extends "center/dashboard.html" %}
{% load static %}

{% block title %}Add Student{% endblock %}

{% block content %}
<div class="app-main">
    <div class="app-main__outer">
        <div class="app-main__inner">

            <div class="app-page-title mb-4">
                <div class="page-title-wrapper">
                    <div class="page-title-heading">
                        <div class="page-title-icon">
                            <i class="pe-7s-id icon-gradient bg-malibu-beach"></i>
                        </div>
                        <div>
                            Add New Student
                            <div class="page-title-subheading">
                                Center Panel > Add Student
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-card mb-3 card shadow-sm">
                <div class="card-body">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-success alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" enctype="multipart/form-data" id="studentForm">
                        {% csrf_token %}

                        <!-- ROW 1 -->
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student Name</label>
                                <input type="text" name="name" class="form-control"
                                       placeholder="Enter student's full name" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone" class="form-control"
                                       placeholder="10 digit phone number"
                                       pattern="[0-9]{10}" required>
                            </div>
                        </div>

                        <!-- ROW 2 -->
                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">Course</label>
                                <input type="text" name="course" class="form-control"
                                       placeholder="Enter course name" required>
                            </div>

                            <!-- ✅ CENTER NAME SHOW (AUTO) -->
                            <div class="col-md-6">
                                <label class="form-label">Center Name</label>
                                <input type="text" class="form-control"
                                       value="{{ center.name }}" readonly>
                            </div>
                        </div>

                        <!-- ROW 3 -->
                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">Student Photo</label>
                                <input type="file" name="photo" class="form-control" required>
                            </div>
                        </div>

                        <!-- ADDRESS -->
                        <div class="mt-3">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control"
                                      placeholder="Enter student's address"
                                      rows="3" required></textarea>
                        </div>

                        <!-- PASSWORD -->
                        <div class="row g-3 mt-3">
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" name="password"
                                           class="form-control" placeholder="Set password" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="cpassword" name="cpassword"
                                           class="form-control" placeholder="Confirm password" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- SUBMIT -->
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                Add Student
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // ✅ show/hide password
    document.querySelectorAll(".toggle-password").forEach(btn => {
        btn.addEventListener("click", function () {
            const input = this.closest(".input-group").querySelector("input");
            const icon = this.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });
    });

    // ✅ confirm password validation
    document.getElementById("studentForm").addEventListener("submit", function(e){
        const p = document.getElementById("password").value;
        const cp = document.getElementById("cpassword").value;

        if(p !== cp){
            e.preventDefault();
            alert("Passwords do not match!");
        }
    });

});
</script>

{% endblock %}
