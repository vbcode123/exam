{% extends "admin/dashboard.html" %}
{% load static %}

{% block content %}
<div class="app-main__outer">
<div class="app-main__inner">

    <!-- Page Header -->
    <div class="app-page-title mb-4">
        <div class="page-title-wrapper d-flex justify-content-between align-items-center">
            <div class="page-title-heading">
                <div class="page-title-icon">
                    <i class="pe-7s-bookmarks icon-gradient bg-mean-fruit"></i>
                </div>
                <div>
                    Chapters
                    <div class="page-title-subheading">
                        Subject: <strong>{{ subject.name }}</strong>
                    </div>
                </div>
            </div>

            <div class="page-title-actions">
                <span class="badge bg-primary fs-6">
                    Total Chapters: {{ chapters|length }}
                </span>
            </div>
        </div>
    </div>

    <!-- Chapters Table -->
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Chapter Name</th>
                            <th class="text-center" style="width: 260px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in chapters %}
                        <tr>
                            <td class="ps-4 fw-semibold">
                                <i class="fa fa-folder-open text-primary me-2"></i>
                                {{ c.name }}
                            </td>

                            <td class="text-center">
                                <a href="{% url 'view_chapter' c.id %}"
                                   class="btn btn-outline-info btn-sm me-1">
                                    <i class="fa fa-eye"></i> View
                                </a>

                                <a href="{% url 'edit_chapter' c.id %}"
                                   class="btn btn-outline-warning btn-sm me-1">
                                    <i class="fa fa-edit"></i> Edit
                                </a>

                                <a href="{% url 'delete_chapter' c.id %}"
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('This will delete the chapter and all its questions. Continue?')">
                                    <i class="fa fa-trash"></i> Delete
                                </a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center py-4 text-muted">
                                No chapters found for this subject
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>
</div>
{% endblock %}
