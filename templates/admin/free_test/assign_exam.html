{% extends "admin/dashboard.html" %}
{% block content %}

<div class="app-main__outer">
<div class="app-main__inner">

    <!-- Page Header -->
    <div class="app-page-title mb-4">
        <div class="page-title-wrapper d-flex justify-content-between align-items-center">
            <div class="page-title-heading">
                <div class="page-title-icon">
                    <i class="pe-7s-note2 icon-gradient bg-mean-fruit"></i>
                </div>
                <div>
                    Assign Exam to Button {{ button.name }}
                    <div class="page-title-subheading">
                        Select one exam for this Free Test button
                    </div>
                </div>
            </div>

            <a href="{% url 'admin_free_test_buttons' %}"
               class="btn btn-outline-secondary">
                ← Back
            </a>
        </div>
    </div>

    <!-- Assign Form -->
    <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Select Exam
                            </label>
                            <select name="exam"
                                    class="form-select form-select-lg"
                                    required>
                                <option value="">-- Choose Exam --</option>
                                {% for e in exams %}
                                <option value="{{ e.id }}"
                                    {% if button.exam and button.exam.id == e.id %}
                                        selected
                                    {% endif %}>
                                    {{ e.name }}
                                    ({{ e.duration_minutes }} min,
                                     {{ e.marks_per_question }} marks/Q)
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-success btn-lg w-100">
                            Save Assignment
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
</div>

{% endblock %}
