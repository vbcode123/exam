{% extends "admin/dashboard.html" %}
{% load static %}

{% block content %}
<div class="app-main__outer">
<div class="app-main__inner">

    <!-- Page Header -->
    <div class="app-page-title mb-4">
        <div class="page-title-wrapper">
            <div class="page-title-heading">
                <div class="page-title-icon">
                    <i class="pe-7s-help1 icon-gradient bg-mean-fruit"></i>
                </div>
                <div>
                    Add Questions
                    <div class="page-title-subheading">
                        Subject: <strong>{{ subject }}</strong> |
                        Chapter: <strong>{{ chapter }}</strong>
                    </div>
                </div>
            </div>

            <div class="page-title-actions">
                <span class="badge bg-primary fs-6">
                    Question No: {{ count }}
                </span>
            </div>
        </div>
    </div>

    <!-- Main Card -->
    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-9 col-md-11 col-sm-12">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">

                    <form method="post">
                        {% csrf_token %}

                        <!-- Question -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Question
                            </label>
                            <textarea name="question"
                                      class="form-control form-control-lg"
                                      rows="3"
                                      placeholder="Type the question here..."
                                      required></textarea>
                        </div>

                        <!-- Options -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="fw-semibold">Option A</label>
                                <input type="text"
                                       name="option_a"
                                       class="form-control"
                                       placeholder="Enter option A"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-semibold">Option B</label>
                                <input type="text"
                                       name="option_b"
                                       class="form-control"
                                       placeholder="Enter option B"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-semibold">Option C</label>
                                <input type="text"
                                       name="option_c"
                                       class="form-control"
                                       placeholder="Enter option C"
                                       required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="fw-semibold">Option D</label>
                                <input type="text"
                                       name="option_d"
                                       class="form-control"
                                       placeholder="Enter option D"
                                       required>
                            </div>
                        </div>

                        <!-- Correct Answer -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Correct Answer
                            </label>
                            <select name="correct_answer"
                                    class="form-select form-select-lg"
                                    required>
                                <option value="">Select correct option</option>
                                <option value="A">Option A</option>
                                <option value="B">Option B</option>
                                <option value="C">Option C</option>
                                <option value="D">Option D</option>
                            </select>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                            <button type="submit"
                                    class="btn btn-success btn-lg px-4">
                                <i class="fa fa-arrow-right me-2"></i>
                                Next Question
                            </button>

                            <button type="submit"
                                    name="final_save"
                                    class="btn btn-danger btn-lg px-4">
                                <i class="fa fa-save me-2"></i>
                                Final Save
                            </button>
                        </div>

                    </form>

                    <!-- Footer Info -->
                    <div class="text-center mt-4">
                        <span class="badge bg-secondary fs-6">
                            Total Questions Added: {{ total }}
                        </span>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
</div>
{% endblock %}
