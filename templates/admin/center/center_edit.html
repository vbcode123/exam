{% extends "admin/dashboard.html" %}
{% load static %}

{% block title %}Edit Center{% endblock %}

{% block content %}
<div class="app-main">
    <div class="app-main__outer">
        <div class="app-main__inner">

            <div class="app-page-title mb-4">
                <div class="page-title-wrapper">
                    <div class="page-title-heading">
                        <div class="page-title-icon">
                            <i class="pe-7s-tools icon-gradient bg-malibu-beach"></i>
                        </div>
                        <div>
                            Edit Center
                            <div class="page-title-subheading">
                                Center Dashboard > Edit Center
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-card mb-3 card shadow-sm">
                <div class="card-body">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-success alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" id="centerEditForm">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Center Name</label>
                                <input type="text" name="name" value="{{ center.name }}" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone" value="{{ center.phone }}" class="form-control"
                                       pattern="[0-9]{10}" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-3">
                            <div class="col-md-6">
                                <label class="form-label">New Password (optional)</label>
                                <div class="input-group">
                                    <input type="password" id="password" name="password"
                                           class="form-control" placeholder="New password">
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Confirm New Password</label>
                                <div class="input-group">
                                    <input type="password" id="cpassword" name="cpassword"
                                           class="form-control" placeholder="Confirm password">
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                Update Center
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<style>
.main-card{
    border-radius:15px;
    padding:2rem;
    background:#fff;
}
.form-label{
    font-weight:500;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    document.querySelectorAll(".toggle-password").forEach(btn => {
        btn.addEventListener("click", function () {
            const input = this.closest(".input-group").querySelector("input");
            const icon = this.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });
    });

    document.getElementById("centerEditForm").addEventListener("submit", function (e) {
        const p1 = document.getElementById("password").value;
        const p2 = document.getElementById("cpassword").value;

        if (p1 && p1 !== p2) {
            e.preventDefault();
            alert("Passwords do not match!");
        }
    });

});
</script>

{% endblock %}
